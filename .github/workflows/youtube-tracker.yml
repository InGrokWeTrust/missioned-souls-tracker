name: YouTube Reaction Tracker

on:
  schedule:
    - cron: '*/5 * * * *'   # Runs every hour at minute 0
  workflow_dispatch:       # Allows manual trigger

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log run time          # <-- ADD THIS SNIPPET HERE
        run: echo "Run at $(date) - triggered by ${{ github.event_name }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client requests

      # Restore last_run.json from cache (if it exists from a previous run)
      - name: Restore last_run.json cache
        uses: actions/cache@v4
        id: cache-restore
        with:
          path: last_run.json
          # Use a fixed key so all runs share the same cache
          key: last-run-data
          restore-keys: last-run-data

      - name: Run YouTube reaction tracker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHANNEL_NAME: ${{ vars.CHANNEL_NAME }}
          MAX_TOTAL_RESULTS: ${{ vars.MAX_TOTAL_RESULTS }}
          MAX_TO_SEND: ${{ vars.MAX_TO_SEND }}
          FORCE_SEND_ALL: ${{ vars.FORCE_SEND_ALL }}
          LAST_RUN_FILE: ${{ vars.LAST_RUN_FILE }}
        run: python autoreactions.py

      # Save the (potentially updated) last_run.json back to cache
      - name: Save last_run.json cache
        if: always()   # Even if the script fails, we want to keep the last successful run timestamp
        uses: actions/cache@v4
        with:
          path: last_run.json
          key: last-run-data

      - name: Upload CSV and HTML as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-reactions
          path: |
            missioned_souls_reactions.csv
            missioned_souls_reactions.html
            last_run.json
